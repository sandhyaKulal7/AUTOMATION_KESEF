[pytest]
addopts =
    --alluredir=reports/allure-results
    --screenshot=only-on-failure
    --video=retain-on-failure
    --tracing=retain-on-failure
    -v
    --tb=short

markers =
    smoke:       Critical happy-path tests — run on every deploy
    regression:  Full regression suite
    sanity:      Quick sanity after a build
    calculations: Calculation verification tests
    ui:          UI / browser tests
    api:         API-level tests
    auth:        Authentication tests
    payments:    Payment workflow tests
    reports:     Reports page tests
    cross_screen: Cross-screen consistency tests
    role_access: Role-based access control tests

pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
